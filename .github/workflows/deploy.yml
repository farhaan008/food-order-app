name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Deploy via SSH
    uses: appleboy/ssh-action@v0.1.10

    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_SSH_KEY }}

      script: |
        cd food-order-app || git clone https://github.com/farhaan008/food-order-app.git
        cd food-order-app
        git pull origin main
        npm install
        pm2 restart food-app || pm2 start server.js --name food-app